apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-service
  namespace: backend
  labels:
    app: mcp-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-service
  template:
    metadata:
      labels:
        app: mcp-service
    spec:
      containers:
        - name: mcp-service
          image: mandyl/mcp-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: ES_HOST
              value: "elasticsearch.backend.svc.cluster.local"
            - name: ES_PORT
              value: "9200"
            # Alternatively, set ES_ADDR directly:
            # - name: ES_ADDR
            #   value: "http://elasticsearch.backend.svc.cluster.local:9200"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
